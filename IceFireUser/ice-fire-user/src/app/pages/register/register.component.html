<div class="register-page">
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form" autocomplete="off">
    <div class="form-header">
      <h2>Register</h2>
      <p>Create a new account to get started.</p>
    </div>

    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" type="text" formControlName="username" placeholder="username" required autofocus />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" placeholder="••••••••" required />
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input id="confirmPassword" type="password" formControlName="confirmPassword" placeholder="••••••••" required />
    </div>

    <div *ngIf="error$ | async as error" class="error-message">
      {{ error?.error?.message }}
    </div>

    <button class="submit-button" [disabled]="loading$ | async" type="submit">
      {{ (loading$ | async) ? 'Registering...' : 'Register' }}
    </button>

    <div class="footer">
      Already have an account?
      <a routerLink="/login">Login</a>
    </div>
  </form>
</div>
